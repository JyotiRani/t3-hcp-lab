# Ansible Inventory for K3s Cluster
# Update the IP address with your VSI floating IP from Terraform output


[K3S_CLUSTER]
k3s-node ansible_host=##FLOATING_IP## ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/##SSH_KEY_NAME##

[K3S_CLUSTER:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/##SSH_KEY_NAME##


