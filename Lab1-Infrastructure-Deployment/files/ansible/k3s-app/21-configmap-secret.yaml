apiVersion: v1
kind: ConfigMap
metadata:
  name: logistics-config
  namespace: logistics
data:
  # Service URLs
  EXTERNAL_BASE_SERVICE_URL: http://##FLOATING_IP##:32696
  EXTERNAL_AUTH_SERVICE_URL: http://##FLOATING_IP##/auth
  EXTERNAL_ORDER_SERVICE_URL: http://##FLOATING_IP##/order
  EXTERNAL_SHIPMENT_SERVICE_URL: http://##FLOATING_IP##/shipment
  EXTERNAL_TRACKING_SERVICE_URL: http://##FLOATING_IP##/tracking
  EXTERNAL_AIAGENT_SERVICE_URL: http://##FLOATING_IP##/aiagent

  AUTH_SERVICE_URL: "http://auth-service:8001"
  ORDER_SERVICE_URL: "http://order-service:8002"
  SHIPMENT_SERVICE_URL: "http://shipment-service:8003"
  TRACKING_SERVICE_URL: "http://tracking-service:8004"
  AIAGENT_SERVICE_URL: "http://aiagent-service:8005"
  
  # JWT Configuration
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  
  # Application Configuration
  LOG_LEVEL: "INFO"
  DEBUG: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: logistics-secrets
  namespace: logistics
type: Opaque
stringData:
  # JWT Secret Key (generate a strong secret in production)
  JWT_SECRET_KEY: ##JWT_SECRET_KEY##
  # Database
  POSTGRES_DB: logistics_db
  POSTGRES_USER: logistics_user
  POSTGRES_PASSWORD: ##POSTGRES_PASSWORD##
  DATABASE_URL: postgresql://logistics_user:##POSTGRES_PASSWORD##@postgres-service:5432/logistics_db
  # Watsonx.ai
  WATSONX_API_KEY: ##WATSONX_KEY##
  WATSONX_PROJECT_ID: ##WATSONX_PROJECT_ID##