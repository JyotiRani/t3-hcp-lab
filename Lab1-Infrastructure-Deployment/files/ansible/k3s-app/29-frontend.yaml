apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: logistics
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: frontend
        image: gandigit/logistics-linux-frontend:latest  #  with your Docker registry
        imagePullPolicy: Always
        # image: nginx  # Replace with your Docker registry
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: EXTERNAL_BASE_SERVICE_URL
        - name: VITE_AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: EXTERNAL_AUTH_SERVICE_URL
        - name: VITE_ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: EXTERNAL_ORDER_SERVICE_URL
        - name: VITE_SHIPMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: EXTERNAL_SHIPMENT_SERVICE_URL
        - name: VITE_TRACKING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: EXTERNAL_TRACKING_SERVICE_URL
        - name: VITE_AIAGENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: AIAGENT_SERVICE_URL
        resources:
          requests:
            memory: "1024Mi"
            cpu: "100m"
          limits:
            memory: "2048Mi"
            cpu: "200m"
          
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 80
        #   initialDelaySeconds: 10
        #   periodSeconds: 10
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 80
          # initialDelaySeconds: 5
          # periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: logistics
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: frontend
