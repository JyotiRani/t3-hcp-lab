apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-service
  namespace: logistics
  labels:
    app: shipment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipment-service
  template:
    metadata:
      labels:
        app: shipment-service
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: shipment-service
        image: gandigit/logistics-linux-shipment:latest  # Replace with your Docker registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: logistics-secrets
              key: DATABASE_URL
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: logistics-secrets
              key: JWT_SECRET_KEY
        - name: JWT_ALGORITHM
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: JWT_ALGORITHM
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: AUTH_SERVICE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-service
  namespace: logistics
  labels:
    app: shipment-service
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: 8003
    protocol: TCP
    name: http
  selector:
    app: shipment-service

