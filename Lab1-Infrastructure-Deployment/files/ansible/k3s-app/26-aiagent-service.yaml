apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiagent-service
  namespace: logistics
  labels:
    app: aiagent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiagent-service
  template:
    metadata:
      labels:
        app: aiagent-service
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: aiagent-service
        image: gandigit/logistics-linux-aiagent:latest  # Replace with your Docker registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8005
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: logistics-secrets
              key: DATABASE_URL
        - name: WATSONX_API_KEY
          valueFrom:
            secretKeyRef:
              name: logistics-secrets
              key: WATSONX_API_KEY
        - name: WATSONX_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: logistics-secrets
              key: WATSONX_PROJECT_ID
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: logistics-config
              key: AUTH_SERVICE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aiagent-service
  namespace: logistics
  labels:
    app: aiagent-service
spec:
  type: ClusterIP
  ports:
  - port: 8005
    targetPort: 8005
    protocol: TCP
    name: http
  selector:
    app: aiagent-service

