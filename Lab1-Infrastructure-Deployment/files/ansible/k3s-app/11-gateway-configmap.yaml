apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: logistics
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    
    http {
      # Enable logging
      access_log /var/log/nginx/access.log;
      error_log /var/log/nginx/error.log debug;
      
      # Timeout settings
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      send_timeout 60s;
      
      # Define upstream services
      
      upstream frontend {
        server frontend-service:8000;
        keepalive 32;
      }

      upstream auth {
        server auth-service:8001;
        keepalive 32;
      }
      
      upstream order {
        server order-service:8002;
        keepalive 32;
      }
      
      upstream shipment {
        server shipment-service:8003;
        keepalive 32;
      }
      
      upstream tracking {
        server tracking-service:8004;
        keepalive 32;
      }
      
      upstream aiagent {
        server aiagent-service:8005;
        keepalive 32;
      }
      
      # Main server block
      server {
        listen 80;
        server_name _;
        
        # Enable CORS for all routes
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
          return 204;
        }
        
        # Health check endpoint
        location /health {
          return 200 "OK\n";
          add_header Content-Type text/plain;
        }

        ######### API routes (must come before default route)

        # Auth service routes
        location = /auth {
          return 301 $scheme://$http_host/auth/;
        }
        
        location /auth/ {
          proxy_pass http://auth/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }

        # Order service routes
        location = /order {
          return 301 $scheme://$http_host/order/;
        }
        
        location /order/ {
          proxy_pass http://order/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }

        # Shipment service routes
        location = /shipment {
          return 301 $scheme://$http_host/shipment/;
        }
        
        location /shipment/ {
          proxy_pass http://shipment/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }

        # Tracking service routes
        location = /tracking {
          return 301 $scheme://$http_host/tracking/;
        }
        
        location /tracking/ {
          proxy_pass http://tracking/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }

        location /aiagent/ {
          proxy_pass http://aiagent/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          
          proxy_read_timeout 120s;    # Longer timeout for AI operations
        }

        ######### Default route - Frontend (must be last)
        location / {
          proxy_pass http://frontend/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }

      }
    }
